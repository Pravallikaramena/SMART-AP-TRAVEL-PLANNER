<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='register.css') }}">
</head>
<body>
{% include "navbar.html" %}
<div class="container">

<div class="left">
<img src="/static/travel.jpg" alt="">
</div>

<div class="register-box">

<h2>Reset Password</h2>

<form action="/reset_password" method="POST" onsubmit="return validateReset()">

<input type="text" id="resetEmail" name="email" placeholder="Enter your email">
<div id="resetEmailError"></div>

<div class="password-box">
<input type="password" id="resetPassword" name="password" placeholder="New Password">

<span class="toggle" onclick="togglePassword('resetPassword',this)">
<i class="fa-solid fa-eye-slash"></i>
</span>
</div>

<div id="resetPasswordError"></div>


<div class="password-box">
<input type="password" id="resetConfirm" name="confirm" placeholder="Confirm Password">

<span class="toggle" onclick="togglePassword('resetConfirm',this)">
<i class="fa-solid fa-eye-slash"></i>
</span>
</div>

<div id="resetConfirmError"></div>

<button type="submit" >Reset Password</button>

<p><a href="/login">Back to Login</a></p>

</form>

</div>

</div>
   <script src="{{ url_for('static', filename='validation.js') }}"></script>
   

</body>
</html>
