<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='navbar.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
</head>

<body>
{% include "navbar.html" %}

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="alert-message">
✔ {{ messages[0] }}
</div>
{% endif %}
{% endwith %}


<div class="container">

<div class="left">
<h1>TRAVEL</h1>
<h2>EXPLORE HORIZONS</h2>
<p>Where your dream destinations become reality.</p>
</div>

<div class="login-box">

<h2>Login</h2>

<form action="/login_user" method="POST" onsubmit="return validateLogin()">

<input type="email" name="email" placeholder="Enter your email" required>

<input type="password" name="password" placeholder="Enter password" required>

<button type="submit">Sign In</button>

<p class="forgot">
<a href="/forgot_password">Forgot Password?</a>
</p> <br>

<p>Don't have an account?
<a href="/register" >Create Account</a></p>

</form>

</div>

</div>
    <script src="{{ url_for('static', filename='validation.js') }}"></script>
    <script>
document.addEventListener("DOMContentLoaded", function(){

let msg = document.querySelector(".alert-message")

if(msg){

setTimeout(function(){
msg.style.transition = "opacity 0.5s ease";
msg.style.opacity = "0";
setTimeout(function(){
msg.style.display = "none"
},500)
},5000)

}

});
</script>
</body>

</html>
