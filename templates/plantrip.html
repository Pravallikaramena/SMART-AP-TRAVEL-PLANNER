<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Trip</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='navbar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='planai.css') }}?v=1.3">
</head>

<body>
    {% include "navbar.html" %}

    <h2 class="title">Plan Your Smart Trip</h2>

    <!-- CUSTOM ALERT BOX -->
    <div id="alertBox" class="alert-box" style="display:none;"></div>

    <div class="plan-container">
        <form id="tripPlannerForm" action="/ai_recommendations" method="POST">
            
            <!-- CURRENT CITY -->
            <label>Current City</label>
            <input type="text" name="location" list="cityList" placeholder="Search city..." required>

            <!-- CURRENT AREA -->
            <label>Current Area</label>
            <input type="text" id="currentArea" name="current_area" placeholder="Example: MVP Colony">
            <button type="button" class="detect-btn" onclick="detectLocation()">
                📍 Detect My Location
            </button>

            <!-- DESTINATION -->
            <label>Destination City</label>
            <input type="text" name="destination" list="cityList" placeholder="Search destination..." required>

            <datalist id="cityList">
                {% for city in cities %}
                <option value="{{ city }}">
                {% endfor %}
            </datalist>

            <!-- TRAVEL TYPE -->
            <label>Travel Type</label>
            <select id="travelType" name="travel_type" required>
                <option value="">Select Travel Type</option>
                <option value="Bike">🏍️ Bike</option>
                <option value="Auto">🛺 Auto</option>
                <option value="Car">🚗 Car</option>
                <option value="Bus">🚌 Bus</option>
                <option value="Train">🚆 Train</option>
            </select>

            <!-- BUDGET -->
            <label>Budget (₹)</label>
            <input type="number" id="budgetInput" name="budget" placeholder="Enter your budget" required>

            <!-- DAYS -->
            <label>Travel Days</label>
            <input type="number" name="days" placeholder="Number of days">

            <button type="button" id="submitBtn" onclick="checkBudget()">Generate AI Plan</button>
        </form>
    </div>

    <!-- INLINE SCRIPT FOR MAXIMUM RELIABILITY -->
    <script>
        function showMessage(msg, isError = true) {
            const box = document.getElementById('alertBox');
            if (!box) return;
            
            box.innerHTML = `<i class="fas fa-${isError ? 'exclamation-triangle' : 'check-circle'}"></i> <span>${msg}</span>`;
            box.style.display = 'flex';
            box.style.color = isError ? '#d32f2f' : '#2e7d32';
            box.style.borderLeftColor = isError ? '#d32f2f' : '#2e7d32';
            
            if (isError) {
                box.classList.add('alert-shake');
                setTimeout(() => box.classList.remove('alert-shake'), 500);
            }

            // Hide after 6 seconds
            setTimeout(() => {
                box.style.display = 'none';
            }, 6000);
        }

        async function checkBudget() {
            const alertBox = document.getElementById("alertBox");
            if (alertBox) alertBox.style.display = "none";

            const form = document.getElementById("tripPlannerForm");
            const location = form.querySelector('input[name="location"]').value;
            const destination = form.querySelector('input[name="destination"]').value;
            const budget = document.getElementById("budgetInput").value;
            const days = form.querySelector('input[name="days"]').value || 1;
            const travelType = form.querySelector('select[name="travel_type"]').value;

            if (!location) { showMessage("Please enter Current City."); return; }
            if (!destination) { showMessage("Please enter Destination."); return; }
            if (!travelType) { showMessage("Please select a Travel Type (Bike, Car, etc.)."); return; }
            if (!budget) { showMessage("Please enter your Budget."); return; }

            const btn = document.getElementById("submitBtn");
            btn.innerText = "Checking...";
            btn.disabled = true;

            try {
                const response = await fetch('/validate_trip', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        location: location,
                        destination: destination,
                        budget: budget,
                        days: days,
                        travel_type: travelType
                    })
                });

                const result = await response.json();
                if (!result.valid) {
                    showMessage(result.message);
                    btn.innerText = "Generate AI Plan";
                    btn.disabled = false;
                } else {
                    form.submit();
                }
            } catch (e) {
                showMessage("Connection Error. Please try again.");
                btn.innerText = "Generate AI Plan";
                btn.disabled = false;
            }
        }

        function detectLocation() {
            if (!navigator.geolocation) {
                showMessage("Geolocation not supported.");
                return;
            }
            const btn = document.querySelector(".detect-btn");
            const originalText = btn.innerHTML;
            btn.innerHTML = "⏳ Detecting...";
            btn.disabled = true;

            navigator.geolocation.getCurrentPosition(function(position) {
                let lat = position.coords.latitude;
                let lon = position.coords.longitude;
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=en`)
                    .then(res => res.json())
                    .then(data => {
                        let a = data.address;
                        
                        // Extract exact area/road/suburb
                        let areaParts = [];
                        if (a.suburb) areaParts.push(a.suburb);
                        else if (a.neighbourhood) areaParts.push(a.neighbourhood);
                        
                        if (a.road) areaParts.push(a.road);
                        else if (a.amenity) areaParts.push(a.amenity);

                        let cleanArea = areaParts.join(", ");
                        if (!cleanArea && data.display_name) {
                            cleanArea = data.display_name.split(",").slice(0, 2).join(", ");
                        }

                        // Extract and map City
                        let city = a.city || a.town || a.village || a.municipality || "";
                        
                        // Map to dataset city names
                        let cityMap = {
                            "Rajamahendravaram": "Rajahmundry",
                            "Visakhapatnam": "Vizag",
                            "BZA": "Vijayawada",
                            "Amaravati": "Vijayawada"
                        };
                        
                        if (cityMap[city]) city = cityMap[city];
                        
                        // Fallback: If city is empty but county is present (common in rural AP)
                        if (!city && a.county) {
                            city = a.county.replace(" District", "");
                        }

                        document.getElementById("currentArea").value = cleanArea;
                        document.querySelector('input[name="location"]').value = city;
                        
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                        showMessage("Location detected precisely! ✅", false);
                    })
                    .catch(err => {
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                        showMessage("Unable to resolve exact address.");
                    });
            }, function(err) {
                btn.innerHTML = originalText;
                btn.disabled = false;
                showMessage("Location access denied.");
            }, { enableHighAccuracy: true, timeout: 10000 });
        }
    </script>
</body>
</html>
